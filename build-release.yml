name: Build clean Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Kliptora/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install --requirement Kliptora/requirements.txt pyinstaller

      - name: Validate Python sources
        shell: pwsh
        run: |
          python -m compileall -q Kliptora
          python -c "import PySide6, yt_dlp, yt_dlp_ejs, curl_cffi; print('Dependencies imported successfully')"

      - name: Build Kliptora.exe (one-folder, no UPX)
        shell: pwsh
        working-directory: Kliptora
        run: |
          pyinstaller --clean --noconfirm Kliptora.spec
          $appExe = Join-Path $PWD 'dist\Kliptora\Kliptora.exe'
          if (-not (Test-Path -LiteralPath $appExe)) {
            throw "Kliptora.exe was not created at: $appExe"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build Setup.exe
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw 'Inno Setup compiler was not found.'
          }

          $iss = Join-Path $env:GITHUB_WORKSPACE 'installer\Kliptora.iss'
          if (-not (Test-Path -LiteralPath $iss)) {
            throw "Installer script was not found at: $iss"
          }

          & $iscc $iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'release'
          $setup = Get-ChildItem -LiteralPath $releaseDir -Filter 'Kliptora-Setup-*.exe' -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $setup) {
            Write-Host 'Release directory contents:'
            Get-ChildItem -LiteralPath $releaseDir -Force -ErrorAction SilentlyContinue | Format-Table FullName, Length, LastWriteTime
            throw "Installer was not created inside: $releaseDir"
          }

          "SETUP_PATH=$($setup.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_NAME=$($setup.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Installer found: $($setup.FullName)"

      - name: Optional Authenticode signing
        if: env.SIGNING_CERT != ''
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_CERT_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes('cert.pfx', [Convert]::FromBase64String($env:SIGNING_CERT))
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw 'signtool.exe was not found.' }
          & $signtool sign /f cert.pfx /p $env:SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $env:SETUP_PATH
          if ($LASTEXITCODE -ne 0) { throw 'Code signing failed.' }
          Remove-Item cert.pfx -Force

      - name: Create SHA-256 file
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:SETUP_PATH)) {
            throw "Setup file is missing: $env:SETUP_PATH"
          }
          $hashFile = Join-Path (Split-Path $env:SETUP_PATH) "$($env:SETUP_NAME).sha256.txt"
          $hash = (Get-FileHash -LiteralPath $env:SETUP_PATH -Algorithm SHA256).Hash
          "$hash  $($env:SETUP_NAME)" | Set-Content -LiteralPath $hashFile -Encoding ascii
          "HASH_PATH=$hashFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-AuthenticodeSignature -LiteralPath $env:SETUP_PATH | Format-List
          Get-Item -LiteralPath $env:SETUP_PATH | Format-List Name, Length, LastWriteTime

      - name: Microsoft Defender custom scan
        shell: pwsh
        run: |
          $status = Get-MpComputerStatus -ErrorAction SilentlyContinue
          if (-not $status) {
            Write-Warning 'Microsoft Defender is unavailable on this runner; the build continues without claiming a clean scan.'
            exit 0
          }
          Start-MpScan -ScanType CustomScan -ScanPath $env:SETUP_PATH
          Start-Sleep -Seconds 3
          $match = Get-MpThreatDetection -ErrorAction SilentlyContinue | Where-Object {
            ($_.Resources -join ' ') -like "*$($env:SETUP_PATH)*"
          }
          if ($match) {
            $match | Format-List
            throw 'Microsoft Defender detected the generated installer.'
          }
          Write-Host 'Microsoft Defender did not report a detection for the generated installer.'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kliptora-v2.3.3-Windows
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ env.SETUP_PATH }}
            ${{ env.HASH_PATH }}

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $title = "Kliptora $tag"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $env:SETUP_PATH $env:HASH_PATH --clobber
          } else {
            gh release create $tag $env:SETUP_PATH $env:HASH_PATH --title $title --generate-notes
          }
