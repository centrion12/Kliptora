name: Build Kliptora Setup v2.3.3 FIX

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows installer fixed
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: Kliptora/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install --requirement Kliptora/requirements.txt pyinstaller

      - name: Validate Python sources
        shell: pwsh
        run: |
          python -m compileall -q Kliptora
          python -c "import PySide6, yt_dlp, yt_dlp_ejs, curl_cffi; print('Dependencies imported successfully')"

      - name: Build Kliptora.exe
        shell: pwsh
        working-directory: Kliptora
        run: |
          pyinstaller --clean --noconfirm Kliptora.spec
          $app = Join-Path $PWD 'dist\Kliptora\Kliptora.exe'
          if (!(Test-Path -LiteralPath $app)) {
            throw "Kliptora.exe bulunamadi: $app"
          }
          Write-Host "Kliptora.exe olusturuldu: $app"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build and collect Setup.exe
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          $iss = Join-Path $env:GITHUB_WORKSPACE 'installer\Kliptora.iss'

          if (!(Test-Path -LiteralPath $iscc)) {
            throw "ISCC.exe bulunamadi: $iscc"
          }
          if (!(Test-Path -LiteralPath $iss)) {
            throw "Kliptora.iss bulunamadi: $iss"
          }

          & $iscc $iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup hata kodu: $LASTEXITCODE"
          }

          Write-Host 'Workspace icindeki setup adaylari:'
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter 'Kliptora-Setup-*.exe' |
            ForEach-Object { Write-Host $_.FullName }

          $setup = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter 'Kliptora-Setup-v2.3.3.exe' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($null -eq $setup) {
            $setup = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -Filter 'Kliptora-Setup-*.exe' |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
          }

          if ($null -eq $setup) {
            throw 'Inno Setup basarili gorundu ama Setup.exe bulunamadi.'
          }

          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -Path $artifactDir -ItemType Directory -Force | Out-Null
          $finalSetup = Join-Path $artifactDir 'Kliptora-Setup-v2.3.3.exe'
          Copy-Item -LiteralPath $setup.FullName -Destination $finalSetup -Force

          if (!(Test-Path -LiteralPath $finalSetup)) {
            throw "Setup artifact klasorune kopyalanamadi: $finalSetup"
          }

          Write-Host "Setup hazir: $finalSetup"

      - name: Create SHA-256 file
        shell: pwsh
        run: |
          $setup = Join-Path $env:GITHUB_WORKSPACE 'artifact\Kliptora-Setup-v2.3.3.exe'
          $hashFile = Join-Path $env:GITHUB_WORKSPACE 'artifact\Kliptora-Setup-v2.3.3.sha256.txt'
          $hash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash
          "$hash  Kliptora-Setup-v2.3.3.exe" | Set-Content -LiteralPath $hashFile -Encoding ascii
          Get-Item -LiteralPath $setup | Format-List Name, Length, LastWriteTime

      - name: Microsoft Defender custom scan
        shell: pwsh
        run: |
          $setup = Join-Path $env:GITHUB_WORKSPACE 'artifact\Kliptora-Setup-v2.3.3.exe'
          $status = Get-MpComputerStatus -ErrorAction SilentlyContinue
          if ($null -eq $status) {
            Write-Warning 'Defender runner uzerinde kullanilamiyor.'
            exit 0
          }
          Start-MpScan -ScanType CustomScan -ScanPath $setup
          Start-Sleep -Seconds 3
          $detections = Get-MpThreatDetection -ErrorAction SilentlyContinue | Where-Object {
            ($_.Resources -join ' ') -like "*$setup*"
          }
          if ($detections) {
            $detections | Format-List
            throw 'Microsoft Defender kurulum dosyasini tehdit olarak algiladi.'
          }
          Write-Host 'Microsoft Defender bu kurulum dosyasi icin tehdit bildirmedi.'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kliptora-v2.3.3-Windows-FIXED
          if-no-files-found: error
          retention-days: 30
          path: artifact/*
